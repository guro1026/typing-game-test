<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Typing Training</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/screens.css">
  <link rel="stylesheet" href="css/ui.css">
  <link rel="stylesheet" href="css/keyboard.css">
  <link rel="stylesheet" href="css/effects.css">
  <link rel="stylesheet" href="css/theme.css">
</head>

<body class="male-ui">

  <!-- タイトル画面 -->
  <div id="title-screen">
    <h1>タイピング修行</h1>

    <div id="name-area">
      <input id="name-input" type="text" placeholder="姓　名（全角スペース）">
      <button id="name-submit">決定</button>
      <div id="name-error"></div>
    </div>

    <div id="course-buttons" class="hidden">
      <button class="course-btn" data-course="basic">基礎</button>
      <button class="course-btn" data-course="advance">応用</button>
      <button class="course-btn" data-course="boss">ボス戦</button>
    </div>

    <div class="volume-box">
      <input id="volume-slider" type="range" min="0" max="100" value="0">
    </div>
  </div>

  <!-- ゲーム画面 -->
  <div id="game-screen">

    <div id="hud">
      <span>Score: <span id="hud-score">0</span></span>
      <span>Combo: <span id="hud-combo">0</span></span>
      <span>Time: <span id="hud-time">60</span></span>
    </div>

    <div id="word-jp"></div>
    <div id="word-romaji"></div>

    <div id="ki-ball" class="blue"></div>
    <div id="beam"></div>

    <div class="keyboard">
      <div class="key-row">
        <span class="key">Q</span><span class="key">W</span><span class="key">E</span>
        <span class="key">R</span><span class="key">T</span><span class="key">Y</span>
        <span class="key">U</span><span class="key">I</span><span class="key">O</span><span class="key">P</span>
      </div>
      <div class="key-row">
        <span class="key">A</span><span class="key">S</span><span class="key">D</span>
        <span class="key">F</span><span class="key">G</span><span class="key">H</span>
        <span class="key">J</span><span class="key">K</span><span class="key">L</span>
      </div>
      <div class="key-row">
        <span class="key">Z</span><span class="key">X</span><span class="key">C</span>
        <span class="key">V</span><span class="key">B</span><span class="key">N</span>
        <span class="key">M</span>
      </div>
    </div>

    <div class="volume-box">
      <input id="volume-slider-game" type="range" min="0" max="100" value="0">
    </div>
  </div>

  <!-- JS -->
  <script type="module" src="js/main.js"></script>

</body>
</html>
