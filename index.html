<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Typing Game</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/keyboard.css">
  <link rel="stylesheet" href="css/theme.css">
</head>

<body class="male-ui">

  <!-- タイトル画面 -->
  <div id="title-screen">

    <div id="bg-layer"></div>

    <img id="title-girl" src="images/character_Woman.png">
    <img id="title-boy" src="images/character_men.png">

    <img id="title-main" src="images/title_main.png">

    <div id="title-subtext">タイピングで気を高めろ！</div>

    <div id="name-area">
      <div id="name-error"></div>
      <input id="name-input" placeholder="姓　名（全角スペース）">
      <button id="name-submit">決定</button>
    </div>

    <div id="course-buttons" style="display:none;">
      <button class="course-btn" data-course="easy">EASY</button>
      <button class="course-btn" data-course="business">BUSINESS</button>
      <button class="course-btn" data-course="it">IT</button>
      <button class="course-btn" data-course="mail">MAIL</button>
    </div>

    <div id="volume-area">
      <div id="volume-label">BGM</div>
      <input id="volume-slider" type="range" min="0" max="100" value="0">
    </div>

  </div>

  <!-- ゲーム画面 -->
  <div id="game-screen">

    <div id="word-jp"></div>
    <div id="word-romaji"></div>

    <div id="fighter">
      <img id="character" src="images/character_men_kiball.png">
      <img id="ki-ball" src="images/kiball_blue.png" class="blue">
    </div>

    <div id="beam"></div>

    <div id="hud">
      <div class="hud-item">TIME: <span id="hud-time">60</span></div>
      <div class="hud-item">SCORE: <span id="hud-score">0</span></div>
      <div class="hud-item">COMBO: <span id="hud-combo">0</span></div>
    </div>

    <div id="keyboard">
      <div class="key-row">
        <div class="key">Q</div><div class="key">W</div><div class="key">E</div><div class="key">R</div><div class="key">T</div><div class="key">Y</div><div class="key">U</div><div class="key">I</div><div class="key">O</div><div class="key">P</div>
      </div>
      <div class="key-row">
        <div class="key">A</div><div class="key">S</div><div class="key">D</div><div class="key">F</div><div class="key">G</div><div class="key">H</div><div class="key">J</div><div class="key">K</div><div class="key">L</div>
      </div>
      <div class="key-row">
        <div class="key">Z</div><div class="key">X</div><div class="key">C</div><div class="key">V</div><div class="key">B</div><div class="key">N</div><div class="key">M</div>
      </div>
    </div>

    <div id="volume-area-game">
      <div id="volume-label-game">BGM</div>
      <input id="volume-slider-game" type="range" min="0" max="100" value="0">
    </div>

  </div>

  <!-- JS -->
  <script type="module" src="js/main.js"></script>

</body>
</html>
