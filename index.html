<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Typing Game</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ============================
       タイトル画面（名前入力）
  ============================ -->
  <div id="title-screen">

    <div id="bg-layer-title"></div>

    <img id="title-girl" src="images/character/women/stand_woman.png">
    <img id="title-boy" src="images/character/men/stand_man.png">
    <img id="title-main" src="images/ui/title_bg.png">

    <div id="title-subtext">タイピングで気を高めろ！</div>

    <!-- 名前入力 -->
    <div id="name-area">
      <div id="name-error"></div>
      <input id="name-input" placeholder="名前を入力">
      <button id="name-submit">決定</button>
    </div>

    <!-- 音量スライダー -->
    <div id="volume-area">
      <div id="volume-label">BGM</div>
      <input id="volume-slider" type="range" min="0" max="100" value="0">
    </div>

  </div>

  <!-- ============================
       ゲーム画面
  ============================ -->
  <div id="game-screen" style="display:none;">
    <div id="bg-layer-game"></div>

    <p id="countdown"
       style="font-size:60px; color:#00eaff; margin-top:20px; display:none;">
    </p>

    <audio id="startSound" src="sounds/start.mp3" preload="auto"></audio>

    <div id="word-jp"></div>
    <div id="word-romaji"></div>

    <div id="fighter">
      <img id="character" src="images/character/men/kiball_man.png">
      <div id="ki-ball" class="blue"></div>
    </div>

    <div id="beam"></div>

    <div id="hud">
      <div class="hud-item">TIME: <span id="hud-time">60</span></div>
      <div class="hud-item">SCORE: <span id="hud-score">0</span></div>
      <div class="hud-item">COMBO: <span id="hud-combo">0</span></div>
    </div>

    <div id="keyboard">
      <div class="key-row">
        <div class="key">Q</div><div class="key">W</div><div class="key">E</div><div class="key">R</div><div class="key">T</div>
        <div class="key">Y</div><div class="key">U</div><div class="key">I</div><div class="key">O</div><div class="key">P</div>
      </div>
      <div class="key-row">
        <div class="key">A</div><div class="key">S</div><div class="key">D</div><div class="key">F</div><div class="key">G</div>
        <div class="key">H</div><div class="key">J</div><div class="key">K</div><div class="key">L</div>
      </div>
      <div class="key-row">
        <div class="key">Z</div><div class="key">X</div><div class="key">C</div><div class="key">V</div>
        <div class="key">B</div><div class="key">N</div><div class="key">M</div>
      </div>
    </div>
  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- ゲーム本体 -->
  <script src="game2.js"></script>

  <!-- 名前入力処理 -->
  <script>
    document.getElementById("name-submit").addEventListener("click", () => {
      const input = document.getElementById("name-input");
      const error = document.getElementById("name-error");
      const name = input.value.trim();

      if (name === "") {
        error.textContent = "※ 名前を入力してください";
        input.classList.add("error");
        return;
      }

      error.textContent = "";
      input.classList.remove("error");

      localStorage.setItem("playerName", name);

      location.href = "play.html";
    });
  </script>

  <!-- play.html → start=1 で戻ってきたらゲーム開始 -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const params = new URLSearchParams(location.search);

      if (params.get("start") === "1") {
        const course = localStorage.getItem("selectedCourse");
        if (course) startGame();
      }
    });
  </script>

</body>
</html>
