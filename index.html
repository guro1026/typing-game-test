<!-- ============================================================
     index.html（タイトル画面）
     - 名前入力
     - 性別選択（男 / 女）
     - コース選択（EASY / NORMAL / HARD）
     - ゲーム開始前の入口
     ============================================================ -->

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Typing Battle - Title</title>

  <!-- ============================
       CSS 読み込み
       ============================ -->
  <!-- 全体の初期設定（フォント・リセット） -->
  <link rel="stylesheet" href="css/base.css">

  <!-- 共通UI（ボタン・テーマカラー） -->
  <link rel="stylesheet" href="css/ui.css">

  <!-- 画面レイアウト（中央寄せなど） -->
  <link rel="stylesheet" href="css/screens.css">
</head>

<!-- body に theme-male / theme-female が付く（初期は male） -->
<body class="theme-male">

  <!-- ============================================================
       タイトル画面
       ============================================================ -->
  <div id="title-screen" class="screen">

    <!-- ゲームタイトル -->
    <h1>Typing Battle</h1>

    <!-- 名前入力エリア -->
    <div class="input-area">
      <!-- 名前入力欄 -->
      <input id="name-input" type="text" placeholder="名前を入力" />

      <!-- エラーメッセージ表示欄 -->
      <div id="name-error" style="color: #ff6666; height: 20px;"></div>

      <!-- 名前決定ボタン -->
      <button id="name-submit">名前を決定</button>
    </div>

    <!-- 性別選択ボタン -->
    <div style="margin-top: 20px;">
      <button class="gender-btn" data-gender="male">男性</button>
      <button class="gender-btn" data-gender="female">女性</button>
    </div>

    <!-- コース選択（名前が決まってから押せる） -->
    <div class="course-buttons">
      <button class="course-btn" data-course="easy">EASY</button>
      <button class="course-btn" data-course="normal">NORMAL</button>
      <button class="course-btn" data-course="hard">HARD</button>
    </div>

  </div>

  <!-- ============================================================
       JS 読み込み
       ============================================================ -->
  <!-- 性別選択・初期化 -->
  <script type="module" src="js/main.js"></script>

  <!-- 画面遷移（タイトル → ゲーム） -->
  <script type="module" src="js/screens.js"></script>

  <!-- UI テーマ切り替え -->
  <script type="module" src="js/ui.js"></script>

</body>
</html>
