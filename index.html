<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Typing Game</title>

  <!-- style.css（あなたの巨大CSS）を読み込む -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ============================
       タイトル画面（最初に表示）
  ============================ -->
  <div id="title-screen">

    <!-- キラキラ背景レイヤー -->
    <div id="bg-layer"></div>

    <!-- タイトル左：女性キャラ -->
    <img id="title-girl" src="images/character_Woman.png">

    <!-- タイトル右：男性キャラ -->
    <img id="title-boy" src="images/character_men.png">

    <!-- タイトルロゴ -->
    <img id="title-main" src="images/title_main.png">

    <!-- サブタイトル -->
    <div id="title-subtext">
      タイピングで気を高めろ！
    </div>

    <!-- ============================
         名前入力エリア
         ※ JS の最新仕様に合わせて placeholder 修正済み
    ============================ -->
    <div id="name-area">
      <div id="name-error"></div>

      <!-- 名前入力（自由入力） -->
      <input id="name-input" placeholder="名前を入力">

      <!-- 決定ボタン -->
      <button id="name-submit">決定</button>
    </div>

    <!-- ============================
         コース選択（名前決定後に表示）
    ============================ -->
    <div id="course-buttons" style="display:none;">
      <button class="course-btn" data-course="easy">EASY</button>
      <button class="course-btn" data-course="business">BUSINESS</button>
      <button class="course-btn" data-course="it">IT</button>
      <button class="course-btn" data-course="mail">MAIL</button>
    </div>

    <!-- ============================
         タイトル画面の音量調整
    ============================ -->
    <div id="volume-area">
      <div id="volume-label">BGM</div>

      <!-- range: 0〜100 -->
      <input id="volume-slider" type="range" min="0" max="100" value="0">
    </div>

  </div> <!-- /title-screen -->

  <!-- ============================
       ゲーム画面（開始後に表示）
  ============================ -->
  <div id="game-screen">

    <!-- お題（日本語・ローマ字） -->
    <div id="word-jp"></div>
    <div id="word-romaji"></div>

    <!-- ============================
         ファイター（キャラ＋気弾）
    ============================ -->
    <div id="fighter">

      <!-- キャラ画像（男性キャラ初期） -->
      <img id="character" src="images/character_men_kiball.png">

      <!-- 気弾（男性は blue、女性は JS で pink に切替） -->
      <img id="ki-ball" src="images/kiball_blue.png" class="blue">

    </div>

    <!-- ビーム（ゲーム終了時に発射） -->
    <div id="beam"></div>

    <!-- ============================
         HUD（スコア・タイム・コンボ）
    ============================ -->
    <div id="hud">
      <div class="hud-item">TIME: <span id="hud-time">60</span></div>
      <div class="hud-item">SCORE: <span id="hud-score">0</span></div>
      <div class="hud-item">COMBO: <span id="hud-combo">0</span></div>
    </div>

    <!-- ============================
         キーボード（光演出あり）
    ============================ -->
    <div id="keyboard">

      <!-- 1段目 -->
      <div class="key-row">
        <div class="key">Q</div><div class="key">W</div><div class="key">E</div><div class="key">R</div><div class="key">T</div>
        <div class="key">Y</div><div class="key">U</div><div class="key">I</div><div class="key">O</div><div class="key">P</div>
      </div>

      <!-- 2段目 -->
      <div class="key-row">
        <div class="key">A</div><div class="key">S</div><div class="key">D</div><div class="key">F</div><div class="key">G</div>
        <div class="key">H</div><div class="key">J</div><div class="key">K</div><div class="key">L</div>
      </div>

      <!-- 3段目 -->
      <div class="key-row">
        <div class="key">Z</div><div class="key">X</div><div class="key">C</div><div class="key">V</div>
        <div class="key">B</div><div class="key">N</div><div class="key">M</div>
      </div>

    </div>

    <!-- ============================
         ゲーム中の音量調整
    ============================ -->
    <div id="volume-area-game">
      <div id="volume-label-game">BGM</div>

      <!-- range: 0〜100 -->
      <input id="volume-slider-game" type="range" min="0" max="100" value="0">
    </div>

  </div> <!-- /game-screen -->

  <!-- ============================
       ゲーム本体の JS
       ※ 最新版（Part1〜3統合版）を読み込む
  ============================ -->
  <script src="game2.js"></script>

</body>
</html>
