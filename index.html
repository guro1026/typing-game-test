<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typing Battle</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/title.css">
  <link rel="stylesheet" href="css/game.css">
  <link rel="stylesheet" href="css/keyboard.css">
  <link rel="stylesheet" href="css/effects.css">
  <link rel="stylesheet" href="css/screens.css">
  <link rel="stylesheet" href="css/ui.css">

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body class="theme-male">

  <!-- ============================
       タイトル画面
       ============================ -->
  <div id="title-screen">
    <h1 id="game-title">Typing Battle</h1>

    <div id="name-area">
      <input id="name-input" type="text" placeholder="名前を入力">
      <button id="name-submit">決定</button>
      <div id="name-error"></div>
    </div>

    <div id="course-buttons">
      <button class="course-btn" data-course="easy">EASY</button>
      <button class="course-btn" data-course="normal">NORMAL</button>
      <button class="course-btn" data-course="hard">HARD</button>
    </div>

    <label id="volume-label">音量</label>
    <input id="volume-slider" type="range" min="0" max="1" step="0.01">
  </div>


  <!-- ============================
       ゲーム画面
       ============================ -->
  <div id="game-screen">

    <div id="hud">
      <div class="hud-item">スコア: <span id="score">0</span></div>
      <div class="hud-item">コンボ: <span id="combo">0</span></div>
      <div class="hud-item">残り: <span id="time">60</span>s</div>
    </div>

    <div id="word-jp">こんにちは</div>
    <div id="word-romaji">konnichiwa</div>

    <img id="character" src="img/male.png">

    <div id="ki-ball"></div>
    <div id="beam"></div>

    <div id="keyboard"></div>

    <input id="volume-slider-game" type="range" min="0" max="1" step="0.01">
  </div>


  <!-- ============================
       JS（読み込み順が重要）
       ============================ -->
  <script type="module" src="js/ui.js"></script>
  <script type="module" src="js/screens.js"></script>
  <script type="module" src="js/keyboard.js"></script>
  <script type="module" src="js/effects.js"></script>
  <script type="module" src="js/supabase.js"></script>
  <script type="module" src="js/game.js"></script>
  <script type="module" src="js/main.js"></script>

</body>
</html>
