<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>カウントダウン</title>
  <style>
    body {
      background: #000;
      color: #00eaff;
      font-family: "Yu Gothic", sans-serif;
      text-align: center;
      margin: 0;
      padding-top: 120px;
    }
    #count {
      font-size: 480px;
      text-shadow: 0 0 20px #00eaff;
    }
  </style>
</head>

<body>

  <div id="count">3</div>

  <!-- ★ BGM を読み込まない（play.html の BGM をそのまま流すため） -->
  <!-- ★ スタート音を使いたい場合だけ start.mp3 を置く -->
  <!-- <audio id="startSound" src="sounds/start.mp3" preload="auto"></audio> -->

  <script>
    let n = 3;
    const el = document.getElementById("count");

    const timer = setInterval(() => {
      n--;

      if (n > 0) {
        el.textContent = n;

      } else if (n === 0) {
        el.textContent = "START!";

        // スタート音がある場合だけ再生
        const se = document.getElementById("startSound");
        if (se) {
          se.currentTime = 0;
          se.play().catch(()=>{});
        }

      } else {
        clearInterval(timer);
        location.href = "index.html?start=1";
      }
    }, 1000);

    // ESCでタイトルへ
    document.addEventListener("keydown", e => {
      if (e.key === "Escape") {
        clearInterval(timer);
        location.href = "index.html";
      }
    });
  </script>

</body>
</html>
