<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>結果発表 - Typing Game</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* 結果画面専用の軽い追加CSS（位置サイズは変えない） */

    #results-screen {
      width: 100vw;
      height: 100vh;
      background: url("images/game_bg.png") center/cover no-repeat;
      color: white;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    #result-title {
      font-size: 120px;
      font-weight: bold;
      margin-top: 4%;
      text-shadow:
        0 0 20px #fff,
        0 0 40px #ff0,
        0 0 60px #ff0;
    }

    .result-box {
      margin: 20px auto;
      padding: 20px 40px;
      width: 60%;
      background: rgba(0,0,0,0.5);
      border: 4px solid #4cf;
      border-radius: 12px;
      font-size: 48px;
      text-shadow: 0 0 10px #000;
    }

    #enemy-image {
      margin-top: 20px;
      height: 40vh;
      filter: drop-shadow(0 0 20px #fff);
    }

    #back-btn {
      margin-top: 40px;
      padding: 20px 40px;
      font-size: 40px;
      border: 3px solid #4cf;
      background: rgba(0,80,255,0.4);
      color: white;
      border-radius: 10px;
      cursor: pointer;
      text-shadow: 0 0 10px #000;
    }
  </style>
</head>

<body>

  <div id="results-screen">

    <div id="result-title">RESULT</div>

    <div class="result-box">
      スコア：<span id="r-score"></span>
    </div>

    <div class="result-box">
      最大コンボ：<span id="r-maxcombo"></span>
    </div>

    <div class="result-box">
      正確率：<span id="r-accuracy"></span>%
    </div>

    <div class="result-box">
      総タイプ数：<span id="r-total"></span>
      ／ ミス：<span id="r-miss"></span>
    </div>

    <div class="result-box">
      撃破した敵：<span id="r-enemy"></span>
    </div>

    <img id="enemy-image" src="" alt="enemy">

    <div class="result-box" style="font-size:40px;">
      <span id="r-comment"></span>
    </div>

    <button id="back-btn">タイトルへ戻る</button>

  </div>

  <script>
    // ============================
    // localStorage から結果を取得
    // ============================
    const score = localStorage.getItem("score") || 0;
    const maxCombo = localStorage.getItem("maxCombo") || 0;
    const accuracy = localStorage.getItem("accuracy") || 0;
    const totalTyped = localStorage.getItem("totalTyped") || 0;
    const missCount = localStorage.getItem("missCount") || 0;
    const defeatedEnemy = localStorage.getItem("defeatedEnemy") || "？？？";
    const weaknessComment = localStorage.getItem("weaknessComment") || "";

    // ============================
    // 表示に反映
    // ============================
    document.getElementById("r-score").textContent = score;
    document.getElementById("r-maxcombo").textContent = maxCombo;
    document.getElementById("r-accuracy").textContent = accuracy;
    document.getElementById("r-total").textContent = totalTyped;
    document.getElementById("r-miss").textContent = missCount;
    document.getElementById("r-enemy").textContent = defeatedEnemy;
    document.getElementById("r-comment").textContent = weaknessComment;

    // ============================
    // 敵画像の自動選択
    // ============================
    const enemyImg = document.getElementById("enemy-image");

    const enemyImages = {
      "サイバイマン": "images/enemy_saibaiman.png",
      "ラディッツ": "images/enemy_raditz.png",
      "ナッパ": "images/enemy_nappa.png",
      "ベジータ（初期）": "images/enemy_vegeta.png",
      "フリーザ（第1形態）": "images/enemy_frieza1.png",
      "フリーザ（最終形態）": "images/enemy_frieza_final.png",
      "セル（完全体）": "images/enemy_cell.png",
      "魔人ブウ（善）": "images/enemy_buu_good.png",
      "魔人ブウ（純粋）": "images/enemy_buu_kid.png",
      "ビルス": "images/enemy_beerus.png",
      "破壊神クラス撃破": "images/enemy_god.png"
    };

    enemyImg.src = enemyImages[defeatedEnemy];


    // ============================
    // タイトルへ戻る
    // ============================
    document.getElementById("back-btn").addEventListener("click", () => {
      location.href = "index.html";
    });
  </script>

</body>
</html>
