<!-- ============================================================
     results.html（リザルト画面）
     - スコア表示
     - 命中率表示
     - ランキング表示（Supabase）
     - タイトルへ戻るボタン
     ============================================================ -->

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Typing Battle - Results</title>

  <!-- ============================
       CSS 読み込み
       ============================ -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/ui.css">
  <link rel="stylesheet" href="css/screens.css">
</head>

<body>

  <!-- ============================================================
       リザルト画面
       ============================================================ -->
  <div id="results-screen" class="screen">

    <!-- タイトル -->
    <h2>RESULT</h2>

    <!-- スコア表示ボックス -->
    <div class="result-box">
      <p>名前：<span id="result-name">---</span></p>
      <p>スコア：<span id="result-score">0</span></p>
      <p>命中率：<span id="result-accuracy">0%</span></p>
    </div>

    <!-- ランキング表示 -->
    <h3>ランキング TOP10</h3>

    <table id="ranking-table">
      <thead>
        <tr>
          <th>順位</th>
          <th>名前</th>
          <th>スコア</th>
          <th>命中率</th>
          <th>日付</th>
        </tr>
      </thead>
      <tbody id="ranking-body">
        <!-- JS で Supabase から読み込んで埋め込む -->
      </tbody>
    </table>

    <!-- タイトルへ戻る -->
    <button id="back-title">タイトルへ戻る</button>

  </div>

  <!-- ============================================================
       JS 読み込み
       ============================================================ -->
  <script type="module" src="js/results.js"></script>
  <script type="module" src="js/supabase.js"></script>

</body>
</html>
