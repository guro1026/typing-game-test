<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typing Battle - Results</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/ui.css">
  <link rel="stylesheet" href="css/results.css">

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body class="theme-male">

  <!-- ============================
       結果画面
       ============================ -->
  <div class="container" id="results-screen">

    <h1 id="results-title">RESULT</h1>

    <!-- 前回スコア -->
    <div id="result-box">
      <p>スコア：<span id="result-score">0</span></p>
      <p>最大コンボ：<span id="result-maxcombo">0</span></p>
      <p>総タイプ数：<span id="result-total">0</span></p>
      <p>ミス：<span id="result-miss">0</span></p>
      <p>正確率：<span id="result-accuracy">0%</span></p>
    </div>

    <!-- ランキング -->
    <h2>ランキング TOP10</h2>
    <table>
      <thead>
        <tr>
          <th>順位</th>
          <th>名前</th>
          <th>スコア</th>
          <th>正確率</th>
          <th>日付</th>
        </tr>
      </thead>
      <tbody id="ranking-body">
        <!-- JS で自動挿入 -->
      </tbody>
    </table>

    <!-- ボタン -->
    <div style="margin-top: 40px;">
      <button id="back-title">タイトルへ戻る</button>
    </div>

  </div>

  <!-- ============================
       JS（読み込み順）
       ============================ -->
  <script type="module" src="js/ui.js"></script>
  <script type="module" src="js/supabase.js"></script>
  <script type="module" src="js/results.js"></script>

</body>
</html>
