<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>結果発表 - Typing Game</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: "Yu Gothic", sans-serif;
    }

    #results-screen {
      width: 100vw;
      height: 100vh;
      color: white;
      text-align: center;
      position: relative;
      overflow: hidden;
      background: #000;
    }

    #result-title {
      font-size: 60px;
      font-weight: bold;
      margin-top: 3%;
      text-shadow: 0 0 20px #fff, 0 0 40px #ff0, 0 0 60px #ff0;
    }

    .result-box {
      margin: 15px auto;
      padding: 15px 30px;
      width: 60%;
      background: rgba(0,0,0,0.45);
      border: 3px solid #fff;
      border-radius: 12px;
      font-size: 24px;
      text-shadow: 0 0 10px #000;
    }

    #comment-box {
      font-size: 20px;
      padding: 15px 25px;
      width: 60%;
      margin: 20px auto;
      background: rgba(0,0,0,0.55);
      border: 2px solid #fff;
      border-radius: 10px;
      text-shadow: 0 0 10px #000;
    }

    #character-image {
      position: absolute;
      top: 20px;
      right: 20px;
      height: 22vh;
      filter: drop-shadow(0 0 20px #fff);
      opacity: 0.9;
    }

    #back-btn {
      margin-top: 25px;
      padding: 12px 28px;
      font-size: 20px;
      border: 3px solid #fff;
      background: rgba(255,255,255,0.2);
      color: white;
      border-radius: 10px;
      cursor: pointer;
      text-shadow: 0 0 10px #000;
    }

    #back-btn:hover {
      background: rgba(255,255,255,0.35);
    }
  </style>
</head>

<body>

  <div id="results-screen">

    <div id="result-title">RESULT</div>

    <img id="character-image" src="" alt="character">

    <div class="result-box">
      スコア：<span id="r-score"></span>
    </div>

    <div class="result-box">
      最大コンボ：<span id="r-maxcombo"></span>
    </div>

    <div class="result-box">
      総タイプ数：<span id="r-total"></span>
      ／ ミス：<span id="r-miss"></span>
    </div>

    <div class="result-box">
      倒した敵：<span id="defeated-enemy"></span>
    </div>

    <div id="comment-box">
      <span id="r-comment"></span>
    </div>

    <!-- 自己ベスト & 順位 -->
    <div id="my-ranking-box" class="result-box">
      <div>自己ベスト：<span id="myBestScore">--</span></div>
      <div>今月の順位：<span id="myRank">--</span></div>
    </div>

    <button id="back-btn">タイトルへ戻る</button>

  </div>

  <!-- ============================================================
       🟦 メインスクリプト
       ============================================================ -->
  <script type="module">

    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    /* ------------------------------------------------------------
       🟦 Supabase 初期化
       ------------------------------------------------------------ */
    let SUPABASE_URL = "";
    let SUPABASE_KEY = "";
    let client = null;

    async function loadConfig() {
      try {
        const res = await fetch("config.json");
        const config = await res.json();
        const env = config.env;

        SUPABASE_URL = config.supabase[env].url;
        SUPABASE_KEY = config.supabase[env].key;

        client = createClient(SUPABASE_URL, SUPABASE_KEY);

      } catch (e) {
        console.error("config.json 読み込みエラー:", e);
      }
    }

    await loadConfig();

    /* ------------------------------------------------------------
       🟦 localStorage から結果を取得
       ------------------------------------------------------------ */
    const score = localStorage.getItem("score") || 0;
    const maxCombo = localStorage.getItem("maxCombo") || 0;
    const totalTyped = localStorage.getItem("totalTyped") || 0;
    const missCount = localStorage.getItem("missCount") || 0;
    const weaknessComment = localStorage.getItem("weaknessComment") || "";
    const defeatedEnemy = localStorage.getItem("defeatedEnemy") || "？？？";
    const gender = localStorage.getItem("gender") || "men";
    const playerName = localStorage.getItem("playerName") || "名無し";

    document.getElementById("r-score").textContent = score;
    document.getElementById("r-maxcombo").textContent = maxCombo;
    document.getElementById("r-total").textContent = totalTyped;
    document.getElementById("r-miss").textContent = missCount;
    document.getElementById("r-comment").textContent = weaknessComment;
    document.getElementById("defeated-enemy").textContent = defeatedEnemy;

    /* ------------------------------------------------------------
       🟦 背景切り替え
       ------------------------------------------------------------ */
    const resultScreen = document.getElementById("results-screen");

    if (gender === "female") {
      resultScreen.style.background =
        'linear-gradient(135deg, #7a0014, #b3001d)';
    } else {
      resultScreen.style.background =
        'linear-gradient(135deg, #0a1a3f, #1c2e5a)';
    }

    /* ------------------------------------------------------------
       🟦 キャラ画像切り替え
       ------------------------------------------------------------ */
    const charImg = document.getElementById("character-image");

    if (gender === "female") {
      charImg.src = "images/character/women/silhouette_woman.png";
    } else {
      charImg.src = "images/character/men/silhouette_man.png";
    }

    /* ------------------------------------------------------------
       🟦 今月の範囲
       ------------------------------------------------------------ */
    const now = new Date();
    const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1).toISOString();
    const endOfMonth = new Date(now.getFullYear(), now.getMonth() + 1, 1).toISOString();

    /* ------------------------------------------------------------
       🟦 自己ベスト取得（score_logs）
       ------------------------------------------------------------ */
    async function loadMyBestScore() {
      const { data, error } = await client
        .from("score_logs")
        .select("score")
        .eq("name", playerName)
        .gte("created_at", startOfMonth)
        .lt("created_at", endOfMonth)
        .order("score", { ascending: false })
        .limit(1);

      const best = data?.length ? data[0].score : "--";
      document.getElementById("myBestScore").textContent = best;
    }

    /* ------------------------------------------------------------
       🟦 自分の順位取得（score_logs）
       ------------------------------------------------------------ */
    async function loadMyRank() {
      const { data, error } = await client
        .from("score_logs")
        .select("name, score")
        .gte("created_at", startOfMonth)
        .lt("created_at", endOfMonth)
        .order("score", { ascending: false });

      // ▼ 通信エラー
      if (error) {
        console.error("Supabase エラー:", error);
        document.getElementById("myRank").textContent = "--";
        return;
      }

      // ▼ data が null または空
      if (!Array.isArray(data) || data.length === 0) {
        document.getElementById("myRank").textContent = "--";
        return;
      }

      // ▼ 自分の順位
      const index = data.findIndex(row => row.name === playerName);

      document.getElementById("myRank").textContent =
        index >= 0 ? `${index + 1} 位` : "--";
    }

    loadMyBestScore();
    loadMyRank();

    /* ------------------------------------------------------------
       🟦 タイトルへ戻る
       ------------------------------------------------------------ */
    document.getElementById("back-btn").addEventListener("click", () => {
      location.href = "index.html";
    });

  </script>

</body>
</html>
