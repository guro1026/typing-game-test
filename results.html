<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Typing Result</title>
  <link rel="stylesheet" href="css/results.css">
</head>
<body>

  <div id="result-container">
    <h1>修行結果</h1>

    <div id="result-main">
      <div class="result-row">名前：<span id="res-name"></span></div>
      <div class="result-row">スコア：<span id="res-score"></span></div>
      <div class="result-row">ミス数：<span id="res-miss"></span></div>
      <div class="result-row">正確率：<span id="res-accuracy"></span>%</div>
      <div class="result-row">ランキング対象：<span id="res-employee"></span></div>
    </div>

    <h2>ミスした単語</h2>
    <table id="miss-table">
      <thead>
        <tr>
          <th>日本語</th>
          <th>入力</th>
          <th>正解</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div id="buttons">
      <button id="btn-retry">もう一度修行する</button>
    </div>
  </div>

  <script src="js/results.js"></script>
</body>
</html>
