<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>遊び方 - Typing Game</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: "Yu Gothic", sans-serif;
      text-align: center;
    }

    #play-screen {
      width: 100vw;
      height: 100vh;
      padding-top: 40px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
      text-shadow: 0 0 20px #fff;
    }

    .section-title {
      font-size: 28px;
      margin-top: 30px;
      margin-bottom: 10px;
      text-shadow: 0 0 10px #fff;
    }

    .btn-area {
      margin: 10px auto 20px;
    }

    button {
      padding: 12px 28px;
      margin: 8px;
      font-size: 22px;
      border-radius: 10px;
      border: 2px solid #fff;
      background: rgba(255,255,255,0.15);
      color: #fff;
      cursor: pointer;
      transition: 0.15s;
    }

    button:hover {
      background: rgba(255,255,255,0.3);
    }

    /* ★ 選択中のボタンを光らせる */
    .selected {
      background: #ffd700 !important;
      color: #000 !important;
      border: 3px solid #fff !important;
      box-shadow: 0 0 15px #ffd700, 0 0 30px #ffea00;
      transform: scale(1.1);
    }

    #start-hint {
      margin-top: 40px;
      font-size: 26px;
      color: #ff0;
      text-shadow: 0 0 10px #ff0;
    }
  </style>
</head>

<body>

  <div id="play-screen">

    <h1>遊び方</h1>

    <div>
      ・画面に表示されるローマ字をタイプして敵を倒せ！<br>
      ・コンボをつなげると気弾が成長！<br>
      ・10 / 15 / 20 コンボで奥義を発動！<br>
      ・60秒以内にどれだけ倒せるかが勝負！
    </div>

    <!-- BGM設定 -->
    <div class="section-title">BGM設定</div>
    <div class="btn-area">
      <button class="bgm-btn" data-mode="on">BGMあり</button>
      <button class="bgm-btn" data-mode="off">BGMなし</button>
    </div>

    <!-- コース選択 -->
    <div class="section-title">コース選択</div>
    <div class="btn-area">
      <button class="course-btn" data-course="easy">EASY</button>
      <button class="course-btn" data-course="business">BUSINESS</button>
      <button class="course-btn" data-course="it">IT</button>
      <button class="course-btn" data-course="mail">MAIL</button>
    </div>

    <div id="start-hint">スペースキーでゲーム開始</div>

  </div>

  <script>
    /* ============================================================
       🟦 BGM ボタン選択
       ============================================================ */
    document.querySelectorAll(".bgm-btn").forEach(btn => {
      btn.addEventListener("click", () => {

        // 全ボタンの選択解除
        document.querySelectorAll(".bgm-btn")
          .forEach(b => b.classList.remove("selected"));

        // 選択されたボタンを光らせる
        btn.classList.add("selected");

        // 設定保存
        const mode = btn.dataset.mode;
        localStorage.setItem("bgmEnabled", mode === "on" ? "1" : "0");
      });
    });

    /* ============================================================
       🟦 コース選択ボタン
       ============================================================ */
    document.querySelectorAll(".course-btn").forEach(btn => {
      btn.addEventListener("click", () => {

        // 全ボタンの選択解除
        document.querySelectorAll(".course-btn")
          .forEach(b => b.classList.remove("selected"));

        // 選択されたボタンを光らせる
        btn.classList.add("selected");

        // コース保存
        localStorage.setItem("selectedCourse", btn.dataset.course);
      });
    });

    /* ============================================================
       🟦 スペースキーでゲーム開始
       ============================================================ */
    document.addEventListener("keydown", e => {
      if (e.code === "Space") {
        location.href = "index.html?start=1";
      }
    });
	/* ============================================================
	   🟦 ESCキーでタイトル(index.html)へ戻る
	   ============================================================ */
	document.addEventListener("keydown", e => {
	  if (e.key === "Escape") {
	    location.href = "index.html";
	  }
	});

    /* ============================================================
       🟦 前回の選択状態を復元
       ============================================================ */
    window.addEventListener("DOMContentLoaded", () => {

      // BGM
      const bgm = localStorage.getItem("bgmEnabled");
      if (bgm === "1") {
        document.querySelector('[data-mode="on"]')?.classList.add("selected");
      } else if (bgm === "0") {
        document.querySelector('[data-mode="off"]')?.classList.add("selected");
      }

      // コース
      const course = localStorage.getItem("selectedCourse");
      if (course) {
        document.querySelector(`[data-course="${course}"]`)
          ?.classList.add("selected");
      }
    });
  </script>

</body>
</html>
