<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>遊び方 - Typing Game</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: "Yu Gothic", sans-serif;
      text-align: center;
    }

    #play-screen {
      width: 100vw;
      height: 100vh;
      padding-top: 40px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
      text-shadow: 0 0 20px #fff;
    }

    .section-title {
      font-size: 28px;
      margin-top: 30px;
      margin-bottom: 10px;
      text-shadow: 0 0 10px #fff;
    }

    .btn-area {
      margin: 10px auto 20px;
    }

    button {
      padding: 12px 28px;
      margin: 8px;
      font-size: 22px;
      border-radius: 10px;
      border: 2px solid #fff;
      background: rgba(255,255,255,0.15);
      color: #fff;
      cursor: pointer;
      transition: 0.15s;
    }

    button:hover {
      background: rgba(255,255,255,0.3);
    }

    /* 性別テーマ別の選択色 */
    .theme-male .selected {
      background: #00aaff !important;
      color: #000 !important;
      border: 3px solid #fff !important;
      box-shadow: 0 0 15px #00aaff, 0 0 30px #0088dd;
      transform: scale(1.1);
    }

    .theme-female .selected {
      background: #ff66cc !important;
      color: #000 !important;
      border: 3px solid #fff !important;
      box-shadow: 0 0 15px #ff66cc, 0 0 30px #ff33aa;
      transform: scale(1.1);
    }

    .theme-unknown .selected {
      background: #ffd700 !important;
      color: #000 !important;
      border: 3px solid #fff !important;
      box-shadow: 0 0 15px #ffd700, 0 0 30px #ffea00;
      transform: scale(1.1);
    }

    #start-hint {
      margin-top: 40px;
      font-size: 26px;
      color: #ff0;
      text-shadow: 0 0 10px #ff0;
    }

    #volume-slider {
      width: 200px;
    }
  </style>
</head>

<body class="theme-unknown">

  <!-- 遊び方画面専用BGM -->
  <audio id="bgm" src="sounds/bgm.mp3" preload="auto" loop></audio>

  <div id="play-screen">

    <h1>遊び方</h1>

    <div>
      ・画面に表示されるローマ字をタイプして敵を倒せ！<br>
      ・コンボをつなげると気弾が成長！<br>
      ・10 / 15 / 20 コンボで奥義を発動！<br>
      ・60秒以内にどれだけ倒せるかが勝負！
    </div>

    <!-- BGM設定 -->
    <div class="section-title">BGM設定</div>
    <div class="btn-area">
      <button class="bgm-btn" data-mode="on">BGMあり</button>
      <button class="bgm-btn" data-mode="off">BGMなし</button>
    </div>

    <!-- 音量 -->
    <div class="section-title">音量</div>
    <input id="volume-slider" type="range" min="0" max="100" value="0">

    <!-- コース選択 -->
    <div class="section-title">コース選択</div>
    <div class="btn-area">
      <button class="course-btn" data-course="easy">EASY</button>
      <button class="course-btn" data-course="business">BUSINESS</button>
      <button class="course-btn" data-course="it">IT</button>
      <button class="course-btn" data-course="mail">MAIL</button>
    </div>

    <div id="start-hint">スペースキーでゲーム開始</div>

  </div>

  <script>
    const bgm = document.getElementById("bgm");
    const volSlider = document.getElementById("volume-slider");

    // 性別テーマ反映
    window.addEventListener("DOMContentLoaded", () => {
      const gender = localStorage.getItem("gender");

      if (gender === "female") {
        document.body.classList.add("theme-female");
      } else if (gender === "male") {
        document.body.classList.add("theme-male");
      } else {
        document.body.classList.add("theme-unknown");
      }

      // 音量復元
      const savedVol = localStorage.getItem("volume");
      if (savedVol !== null) {
        volSlider.value = savedVol;
        bgm.volume = savedVol / 100;
      }

      // BGM設定復元
      const bgmEnabled = localStorage.getItem("bgmEnabled");
      if (bgmEnabled === "1") {
        document.querySelector('[data-mode="on"]')?.classList.add("selected");
        bgm.play();
      } else if (bgmEnabled === "0") {
        document.querySelector('[data-mode="off"]')?.classList.add("selected");
        bgm.pause();
      }

      // コース復元
      const course = localStorage.getItem("selectedCourse");
      if (course) {
        document.querySelector(`[data-course="${course}"]`)
          ?.classList.add("selected");
      }
    });

    // 音量変更
    volSlider.addEventListener("input", () => {
      const v = volSlider.value;
      localStorage.setItem("volume", v);
      bgm.volume = v / 100;
    });

    // BGMボタン
    document.querySelectorAll(".bgm-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".bgm-btn")
          .forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");

        const mode = btn.dataset.mode;
        localStorage.setItem("bgmEnabled", mode === "on" ? "1" : "0");

        if (mode === "on") {
          const v = localStorage.getItem("volume") || 0;
          bgm.volume = v / 100;
          bgm.play();
        } else {
          bgm.pause();
        }
      });
    });

    // コース選択
    document.querySelectorAll(".course-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".course-btn")
          .forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        localStorage.setItem("selectedCourse", btn.dataset.course);
      });
    });

    // スペースでカウントダウンへ
    document.addEventListener("keydown", e => {
      if (e.code === "Space") {
        bgm.pause();
        location.href = "countdown.html";
      }
    });

    // ESCでタイトルへ
    document.addEventListener("keydown", e => {
      if (e.key === "Escape") {
        bgm.pause();
        location.href = "index.html";
      }
    });
  </script>

</body>
</html>
