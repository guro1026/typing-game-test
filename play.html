<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>設定 - Typing Game</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: "Yu Gothic", sans-serif;
      text-align: center;
    }

    #play-screen {
      width: 100vw;
      height: 100vh;
      padding-top: 40px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
      text-shadow: 0 0 20px #fff;
    }

    .section-title {
      font-size: 28px;
      margin-top: 30px;
      margin-bottom: 10px;
      text-shadow: 0 0 10px #fff;
    }

    .btn-area {
      margin: 10px auto 20px;
    }

    button {
      padding: 12px 28px;
      margin: 8px;
      font-size: 22px;
      border-radius: 10px;
      border: 2px solid #fff;
      background: rgba(255,255,255,0.15);
      color: #fff;
      cursor: pointer;
      transition: 0.15s;
    }

    button:hover {
      background: rgba(255,255,255,0.3);
    }

    /* 性別テーマ別の選択色 */
    .theme-male .selected {
      background: #00aaff !important;
      color: #000 !important;
      border: 3px solid #fff !important;
      box-shadow: 0 0 15px #00aaff, 0 0 30px #0088dd;
      transform: scale(1.1);
    }

    .theme-female .selected {
      background: #ff66cc !important;
      color: #000 !important;
      border: 3px solid #fff !important;
      box-shadow: 0 0 15px #ff66cc, 0 0 30px #ff33aa;
      transform: scale(1.1);
    }

    .theme-unknown .selected {
      background: #ffd700 !important;
      color: #000 !important;
      border: 3px solid #fff !important;
      box-shadow: 0 0 15px #ffd700, 0 0 30px #ffea00;
      transform: scale(1.1);
    }

    #start-button {
      margin-top: 30px;
      padding: 14px 40px;
      font-size: 26px;
      border-radius: 12px;
      border: 3px solid #fff;
      background: rgba(255,255,255,0.2);
      color: #fff;
      cursor: pointer;
      transition: 0.2s;
    }

    #start-button:hover {
      background: rgba(255,255,255,0.4);
      transform: scale(1.05);
    }

    #volume-slider {
      width: 200px;
    }
  </style>
</head>

<body class="theme-unknown">

  <!-- BGM（ユーザー操作時のみ再生OK） -->
  <audio id="bgm" src="sounds/bgm.mp3" preload="auto" loop></audio>

  <div id="play-screen">

    <h1>設定</h1>

    <!-- BGM設定 -->
    <div class="section-title">BGM設定</div>
    <div class="btn-area">
      <button class="bgm-btn" data-mode="on">BGMあり</button>
      <button class="bgm-btn" data-mode="off">BGMなし</button>
    </div>

    <!-- SE設定 -->
    <div class="section-title">SE設定</div>
    <div class="btn-area">
      <button class="se-btn" data-mode="on">SEあり</button>
      <button class="se-btn" data-mode="off">SEなし</button>
    </div>

    <!-- 音量 -->
    <div class="section-title">音量</div>
    <input id="volume-slider" type="range" min="0" max="100" value="0">

    <!-- コース選択 -->
    <div class="section-title">コース選択</div>
    <div class="btn-area">
      <button class="course-btn" data-course="easy">EASY</button>
      <button class="course-btn" data-course="business">BUSINESS</button>
      <button class="course-btn" data-course="it">IT</button>
      <button class="course-btn" data-course="mail">MAIL</button>
    </div>

    <!-- ゲーム開始ボタン -->
    <button id="start-button">ゲーム開始</button>

  </div>

  <script>
    const bgm = document.getElementById("bgm");
    const volSlider = document.getElementById("volume-slider");

    /* ============================================================
       初期状態：必ず BGMなし・音量0
       ============================================================ */
    window.addEventListener("DOMContentLoaded", () => {

      // 強制リセット
      localStorage.setItem("bgmEnabled", "0");
      localStorage.setItem("seEnabled", "1"); // デフォルトSEあり
      localStorage.setItem("volume", "0");

      volSlider.value = 0;
      bgm.volume = 0;
      bgm.pause();

      // 性別テーマ
      const gender = localStorage.getItem("gender");
      if (gender === "female") document.body.classList.add("theme-female");
      else if (gender === "male") document.body.classList.add("theme-male");
      else document.body.classList.add("theme-unknown");

      // コース復元
      const course = localStorage.getItem("selectedCourse");
      if (course) {
        document.querySelector(`[data-course="${course}"]`)
          ?.classList.add("selected");
      }
    });

    /* ============================================================
       音量変更（ユーザー操作なのでOK）
       ============================================================ */
    volSlider.addEventListener("input", () => {
      const v = volSlider.value;
      localStorage.setItem("volume", v);
      bgm.volume = v / 100;
    });

    /* ============================================================
       BGMあり/なし
       ============================================================ */
    document.querySelectorAll(".bgm-btn").forEach(btn => {
      btn.addEventListener("click", () => {

        document.querySelectorAll(".bgm-btn")
          .forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");

        const mode = btn.dataset.mode;

        if (mode === "on") {
          localStorage.setItem("bgmEnabled", "1");

          const v = localStorage.getItem("volume") || 0;
          bgm.volume = v / 100;

          bgm.play();   // ← ユーザー操作なのでOK
        } else {
          localStorage.setItem("bgmEnabled", "0");
          bgm.pause();
        }
      });
    });

    /* ============================================================
       SEあり/なし
       ============================================================ */
    document.querySelectorAll(".se-btn").forEach(btn => {
      btn.addEventListener("click", () => {

        document.querySelectorAll(".se-btn")
          .forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");

        const mode = btn.dataset.mode;
        localStorage.setItem("seEnabled", mode === "on" ? "1" : "0");
      });
    });

    /* ============================================================
       コース選択
       ============================================================ */
    document.querySelectorAll(".course-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".course-btn")
          .forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        localStorage.setItem("selectedCourse", btn.dataset.course);
      });
    });

    /* ============================================================
       ゲーム開始ボタン → カウントダウンへ
       ============================================================ */
    document.getElementById("start-button").addEventListener("click", () => {
      bgm.pause();
      location.href = "countdown.html";
    });

  </script>

</body>
</html>
